<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Elecra Projects</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#fff;
            width:600px;
            max-width:90%;
            padding:50px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }

        img{
            width:100px;
            margin-bottom:20px;
        }

        h1{
            color:#0B3D91;
            margin-bottom:15px;
        }

        p{
            color:#555;
            font-size:18px;
            line-height:1.7;
            margin-bottom:30px;
        }

        a{
            display:inline-block;
            padding:14px 35px;
            background:#ff9800;
            color:#fff;
            text-decoration:none;
            border-radius:6px;
            font-size:18px;
            font-weight:bold;
        }

        a:hover{
            background:#0B3D91;
        }
    </style>

</head>

<body>

<div class="box">

    <img src="images/logo.png" alt="Elecra Projects">

    <h1>Thank You!</h1>

    <p>
        Your enquiry has been submitted successfully.<br><br>
        Our team will contact you as soon as possible.
    </p>

    <a href="index.html">Back to Home</a>

</div>

</body>
</html>
